<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found | Sector Arcade</title>
  <meta name="description" content="Oops! This page doesn't exist. Head back to Sector Arcade and play free browser games — no download required." />
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="favicon.ico" />
  <meta name="theme-color" content="#00f0ff" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#04060f;--cyan:#00f0ff;--purple:#7b2fff;--text:#ccdaf2;--text-mid:#7a8fae}
    body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;overflow:hidden}
    canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
    .wrap{position:relative;z-index:2;max-width:520px}
    .code{font-family:'Orbitron',monospace;font-size:clamp(5rem,18vw,9rem);font-weight:900;line-height:1;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem;text-shadow:none}
    h1{font-family:'Orbitron',monospace;font-size:clamp(1rem,3vw,1.4rem);font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text);margin-bottom:1rem}
    p{font-size:.95rem;color:var(--text-mid);line-height:1.7;margin-bottom:2rem}
    .actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:.85rem 2rem;border-radius:10px;font-family:'Orbitron',monospace;font-size:.76rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;transition:transform .25s,box-shadow .25s}
    .btn-p{background:linear-gradient(135deg,var(--purple),var(--cyan));color:#fff;box-shadow:0 0 24px rgba(0,240,255,.18)}
    .btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,240,255,.3)}
    .btn-g{border:1px solid rgba(0,240,255,.35);color:var(--cyan);background:rgba(0,240,255,.04)}
    .btn-g:hover{background:rgba(0,240,255,.09);transform:translateY(-2px)}
    .emoji-big{font-size:3rem;margin-bottom:1rem;display:block;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  </style>
</head>
<body>
<canvas id="star-canvas"></canvas>
<div class="wrap">
  <span class="emoji-big">🕹️</span>
  <div class="code">404</div>
  <h1>Level Not Found</h1>
  <p>The page you're looking for has warped to another dimension. Don't worry — there are still 6 free games waiting for you.</p>
  <div class="actions">
    <a href="index.html" class="btn btn-p">🏠 Back to Home</a>
    <a href="index.html#games" class="btn btn-g">🎮 Play Games</a>
  </div>
</div>
<script>
var c=document.getElementById('star-canvas'),ctx=c.getContext('2d'),stars=[],W,H;
function r(){W=c.width=innerWidth;H=c.height=innerHeight;}
function i(){stars=[];for(var n=0;n<180;n++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*.9+.1,vy:Math.random()*.15+.03,tw:Math.random()*Math.PI*2,op:Math.random()*.5+.1});}
function d(){ctx.clearRect(0,0,W,H);stars.forEach(function(s){s.tw+=.016;s.y-=s.vy;if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}var o=s.op*(.6+.4*Math.sin(s.tw));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(180,215,255,'+o.toFixed(2)+')';ctx.fill();});requestAnimationFrame(d);}
r();i();d();window.addEventListener('resize',function(){r();i();});
// Auto-redirect after 10s
setTimeout(function(){window.location.href='index.html';},10000);
</script>
</body>
</html>
